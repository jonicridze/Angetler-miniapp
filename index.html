<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ресторан</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; padding-bottom: 80px; }
    .header { background: #c0392b; padding: 20px; text-align: center; }
    .header h1 { font-size: 28px; }
    .header p { font-size: 14px; opacity: 0.8; margin-top: 5px; }
    .menu-title { text-align: center; padding: 20px; font-size: 22px; color: #e74c3c; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px 20px; }
    .card { background: #2c2c2c; border-radius: 12px; overflow: hidden; }
    .card-icon { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; font-size: 60px; background: #3a3a3a; }
    .card-body { padding: 10px; }
    .card-body h3 { font-size: 14px; margin-bottom: 5px; }
    .card-body p { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .price { color: #e74c3c; font-weight: bold; font-size: 15px; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn { background: #e74c3c; color: white; border: none; border-radius: 8px; width: 30px; height: 30px; font-size: 20px; cursor: pointer; }
    .qty-num { font-size: 16px; min-width: 16px; text-align: center; }
    .add-btn { background: #e74c3c; color: white; border: none; border-radius: 8px; width: 30px; height: 30px; font-size: 20px; cursor: pointer; }
    .cart-bar { position: fixed; bottom: 0; width: 100%; background: #e74c3c; padding: 15px 20px; display: none; justify-content: space-between; align-items: center; z-index: 999; }
    .cart-bar span { font-size: 16px; font-weight: bold; }
    .cart-btn { background: white; color: #e74c3c; border: none; border-radius: 8px; padding: 8px 20px; font-weight: bold; cursor: pointer; font-size: 15px; }
    .page { display: none; }
    .page.active { display: block; }
    .back-btn { background: none; border: none; color: #e74c3c; font-size: 16px; cursor: pointer; padding: 15px; }
    .cart-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; }
    .cart-item-price { color: #e74c3c; font-weight: bold; }
    .cart-total { padding: 20px; font-size: 20px; font-weight: bold; text-align: right; }
    .order-btn { display: block; width: calc(100% - 30px); margin: 0 15px; background: #e74c3c; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .success-page { text-align: center; padding: 60px 20px; }
    .success-page h2 { font-size: 26px; margin-bottom: 10px; color: #2ecc71; }
    .success-page p { color: #aaa; font-size: 16px; margin-bottom: 30px; }
    .success-page button { background: #e74c3c; color: white; border: none; border-radius: 12px; padding: 14px 30px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="menuPage" class="page active">
    <div class="header">
      <h1>Мой Ресторан</h1>
      <p>Вкусно, быстро, с доставкой</p>
    </div>
    <div class="menu-title">Меню</div>
    <div class="menu-grid" id="menuGrid"></div>
    <div class="cart-bar" id="cartBar">
      <span id="cartInfo">0 товаров - 0 руб</span>
      <button class="cart-btn" onclick="showCart()">Корзина</button>
    </div>
  </div>

  <div id="cartPage" class="page">
    <button class="back-btn" onclick="showMenu()">Назад в меню</button>
    <div class="menu-title">Корзина</div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal"></div>
    <button class="order-btn" onclick="placeOrder()">Оформить заказ</button>
  </div>

  <div id="successPage" class="page">
    <div class="success-page">
      <h2>Заказ принят!</h2>
      <p>Мы уже готовим ваш заказ. Ожидайте доставку в течение 30-40 минут.
        </p>
      <button onclick="resetOrder()">Вернуться в меню</button>
    </div>
  </div>

  <script>
    var dishes = [
      { id: 1, name: "Классический бургер", desc: "Говядина, сыр, салат", price: 350, icon: "B" },
      { id: 2, name: "Пицца Маргарита", desc: "Томат, моцарелла, базилик", price: 490, icon: "P" },
      { id: 3, name: "Суши сет", desc: "8 роллов, соус, имбирь", price: 650, icon: "S" },
      { id: 4, name: "Чизкейк", desc: "Клубника, сливочный сыр", price: 280, icon: "C" },
      { id: 5, name: "Паста Карбонара", desc: "Бекон, яйцо, пармезан", price: 420, icon: "P" },
      { id: 6, name: "Салат Цезарь", desc: "Курица, салат, крутоны", price: 320, icon: "S" }
    ];

    var cart = {};

    function renderMenu() {
      var grid = document.getElementById("menuGrid");
      var html = "";
      for (var i = 0; i < dishes.length; i++) {
        var d = dishes[i];
        html += '<div class="card">';
        html += '<div class="card-icon">' + d.icon + '</div>';
        html += '<div class="card-body">';
        html += '<h3>' + d.name + '</h3>';
        html += '<p>' + d.desc + '</p>';
        html += '<div class="card-footer">';
        html += '<span class="price">' + d.price + ' руб</span>';
        html += '<div id="ctrl-' + d.id + '">';
        html += '<button class="add-btn" onclick="addItem(' + d.id + ')">+</button>';
        html += '</div></div></div></div>';
      }
      grid.innerHTML = html;
    }

    function addItem(id) {
      cart[id] = (cart[id] || 0) + 1;
      updateCtrl(id);
      updateCartBar();
    }

    function removeItem(id) {
      if (cart[id] > 1) { cart[id]--; } else { delete cart[id]; }
      updateCtrl(id);
      updateCartBar();
    }

    function updateCtrl(id) {
      var el = document.getElementById("ctrl-" + id);
      if (!el) return;
      if (cart[id]) {
        el.innerHTML = '<div class="qty-control"><button class="qty-btn" onclick="removeItem(' + id + ')">-</button><span class="qty-num">' + cart[id] + '</span><button class="qty-btn" onclick="addItem(' + id + ')">+</button></div>';
      } else {
        el.innerHTML = '<button class="add-btn" onclick="addItem(' + id + ')">+</button>';
      }
    }

    function updateCartBar() {
      var count = 0;
      var total = 0;
      for (var id in cart) {
        count += cart[id];
        for (var i = 0; i < dishes.length; i++) {
          if (dishes[i].id == id) total += dishes[i].price * cart[id];
        }
      }
      var bar = document.getElementById("cartBar");
      if (count > 0) {
        bar.style.display = "flex";
        document.getElementById("cartInfo").textContent = count + " товаров - " + total + " руб";
      } else {
        bar.style.display = "none";
      }
    }

    function getTotal() {
      var total = 0;
      for (var id in cart) {
        for (var i = 0; i < dishes.length; i++) {
          if (dishes[i].id == id) total += dishes[i].price * cart[id];
        }
      }
      return total;
    }

    function showCart() {
      var items = document.getElementById("cartItems");
      var keys = Object.keys(cart);
      if (keys.length === 0) {
        items.innerHTML = '<div style="text-align:center;padding:60px;color:#aaa">Корзина пуста</div>';
        document.getElementById("cartTotal").textContent = "";
      } else {
        var html = "";
        for (var id in cart) {
          var dish = null;
          for (var i = 0; i < dishes.length; i++) {
            if (dishes[i].id == id) dish = dishes[i];
          }
          html += '<div class="cart-item"><div>' + dish.name + ' x' + cart[id] + '</div><div class="cart-item-price">' + dish.price * cart[id] + ' руб</div></div>';
        }
        items.innerHTML = html;
        document.getElementById("cartTotal").textContent = "Итого: " + getTotal() + " руб";
      }
      showPage("cartPage");
    }

    function showMenu() { showPage("menuPage"); }

    function showPage(id) {
      var pages = document.querySelectorAll(".page");
      for (var i = 0; i < pages.length; i++) pages[i].classList.remove("active");
      document.
        getElementById(id).classList.add("active");
      window.scrollTo(0, 0);
    }

    function placeOrder() {
      cart = {};
      updateCartBar();
      renderMenu();
      showPage("successPage");
    }

    function resetOrder() { showPage("menuPage"); }

    renderMenu();
  </script>
</body>
</html>
