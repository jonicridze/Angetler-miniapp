 <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ресторан</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; }
    .header { background: #c0392b; padding: 20px; text-align: center; }
    .header h1 { font-size: 28px; }
    .header p { font-size: 14px; opacity: 0.8; margin-top: 5px; }
    .menu-title { text-align: center; padding: 20px; font-size: 22px; color: #e74c3c; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px 20px; }
    .card { background: #2c2c2c; border-radius: 12px; overflow: hidden; }
    .card img { width: 100%; height: 130px; object-fit: cover; }
    .card-body { padding: 10px; }
    .card-body h3 { font-size: 14px; margin-bottom: 5px; }
    .card-body p { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .price { color: #e74c3c; font-weight: bold; font-size: 15px; }
    .add-btn { background: #e74c3c; color: white; border: none; border-radius: 8px; padding: 5px 12px; font-size: 18px; cursor: pointer; }
    .cart-bar { position: fixed; bottom: 0; width: 100%; background: #e74c3c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; display: none; }
    .cart-bar span { font-size: 16px; font-weight: bold; }
    .cart-btn { background: white; color: #e74c3c; border: none; border-radius: 8px; padding: 8px 20px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🍽️ Мой Ресторан</h1>
    <p>Вкусно, быстро, с доставкой</p>
  </div>

  <div class="menu-title">📋 Меню</div>

  <div class="menu-grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" alt="Бургер">
      <div class="card-body">
        <h3>Классический бургер</h3>
        <p>Говядина, сыр, салат</p>
        <div class="card-footer">
          <span class="price">350 ₽</span>
          <button class="add-btn" onclick="addToCart('Бургер', 350)">+</button>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300" alt="Пицца">
      <div class="card-body">
        <h3>Пицца Маргарита</h3>
        <p>Томат, моцарелла, базилик</p>
        <div class="card-footer">
          <span class="price">490 ₽</span>
          <button class="add-btn" onclick="addToCart('Пицца', 490)">+</button>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1569050467447-ce54b3bbc37d?w=300" alt="Суши">
      <div class="card-body">
        <h3>Суши сет</h3>
        <p>8 роллов, соус, имбирь</p>
        <div class="card-footer">
          <span class="price">650 ₽</span>
          <button class="add-btn" onclick="addToCart('Суши', 650)">+</button>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=300" alt="Десерт">
      <div class="card-body">
        <h3>Чизкейк</h3>
        <p>Клубника, сливочный сыр</p>
        <div class="card-footer">
          <span class="price">280 ₽</span>
          <button class="add-btn" onclick="addToCart('Чизкейк', 280)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cart-bar" id="cartBar">
    <span id="cartInfo">0 товаров — 0 ₽</span>
    <button class="cart-btn">Заказать 🛒</button>
  </div>
